<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoL Esports Viewer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>LoL Esports Viewer</h1>
    <p class="subtitle">Live schedule &amp; standings, sourced from Leaguepedia</p>
  </header>

  <main class="app-main">
    <section class="controls">
      <label for="tournament-select">Tournament</label>
      <select id="tournament-select">
        <option value="">Loading tournaments&hellip;</option>
      </select>
      <button id="refresh-btn" type="button">Refresh</button>
    </section>

    <section id="status" class="status" role="status" aria-live="polite"></section>

    <div class="columns">
      <section class="panel">
        <h2>Matches</h2>
        <div id="schedule" class="schedule"></div>
      </section>

      <section class="panel">
        <h2>Standings</h2>
        <div id="standings" class="standings"></div>
      </section>
    </div>
  </main>

  <footer class="app-footer">
    <p>Data courtesy of <a href="https://lol.fandom.com" target="_blank" rel="noopener">Leaguepedia</a>, licensed under CC BY-SA.</p>
  </footer>

  <script src="js/leaguepedia.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
